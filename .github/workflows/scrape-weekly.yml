name: Weekly scraping

on:
  schedule:
    - cron: "0 6 * * 1"
  workflow_dispatch:
    inputs:
      keywords:
        description: "Optional comma-separated keywords. When set, overrides keyword_profile."
        required: false
        default: ""
      keyword_profile:
        description: "Keyword profile from config/scraping_keywords.toml"
        required: false
        default: "consulting"
        type: choice
        options:
          - consulting
      portals:
        description: "Comma-separated portals or 'all' stable defaults; include theprotocol explicitly for diagnostics"
        required: false
        default: "all"
      limit_per_portal:
        description: "Maximum offers per portal"
        required: false
        default: "200"
      limit_per_keyword:
        description: "Maximum offers fetched per keyword before filtering"
        required: false
        default: "50"

permissions:
  contents: write

concurrency:
  group: weekly-scraping-${{ github.ref }}
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          playwright install --with-deps chromium

      - name: Run scraping
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          set +e
          python scripts/run_scraping.py \
            --keywords "${{ github.event.inputs.keywords || '' }}" \
            --keyword-profile "${{ github.event.inputs.keyword_profile || 'consulting' }}" \
            --portals "${{ github.event.inputs.portals || 'all' }}" \
            --limit-per-portal "${{ github.event.inputs.limit_per_portal || '200' }}" \
            --limit-per-keyword "${{ github.event.inputs.limit_per_keyword || '50' }}"
          echo "$?" > scraping_exit_code.txt
          exit 0

      - name: Commit snapshots
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/snapshots/ .gitattributes
          git diff --staged --quiet || git commit -m "chore(data): weekly snapshot $(date +%Y-%m-%d)"
          git push

      - name: Upload scraping summary
        uses: actions/upload-artifact@v4
        with:
          name: scraping-summary-${{ github.run_id }}
          path: data/snapshots/*/summary.json

      - name: Fail if scraping was degraded
        run: |
          exit_code="$(cat scraping_exit_code.txt 2>/dev/null || echo 1)"
          exit "$exit_code"
